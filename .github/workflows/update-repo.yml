name: Update APT Repository

on:
  # Triggered by other repos after release
  repository_dispatch:
    types: [release-published]

  # Manual trigger with optional version overrides
  workflow_dispatch:
    inputs:
      odio_version:
        description: "go-odio-api version (e.g. v0.9.0) — leave empty to use latest"
        required: false
      discplayer_version:
        description: "go-mpd-discplayer version (e.g. v0.8.0) — leave empty to use latest"
        required: false

  # Rebuild nightly to catch any missed releases
  schedule:
    - cron: "0 4 * * 1"  # Monday 4am UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-repo:
    name: Build APT Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"

      - name: Configure reprepro
        run: |
          mkdir -p conf
          cat > conf/distributions <<EOF
          Origin: b0bbywan
          Label: Odio APT Repository
          Codename: stable
          Architectures: amd64 arm64 armhf armv7hf
          Components: main
          Description: APT repository for Odio ecosystem packages
          SignWith: ${GPG_KEY_ID}
          EOF

          cat > conf/options <<EOF
          verbose
          basedir /home/runner/work/apt-repo/apt-repo/repo
          EOF

      - name: Resolve versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          resolve_version() {
            local repo="$1" input_version="$2"
            if [ -n "${input_version}" ]; then
              echo "${input_version}"
            else
              gh release view --repo "b0bbywan/${repo}" --json tagName -q '.tagName' 2>/dev/null || echo ""
            fi
          }

          ODIO_VERSION=$(resolve_version "go-odio-api" "${{ github.event.inputs.odio_version }}")
          DISCPLAYER_VERSION=$(resolve_version "go-mpd-discplayer" "${{ github.event.inputs.discplayer_version }}")

          echo "ODIO_VERSION=${ODIO_VERSION}" >> "$GITHUB_ENV"
          echo "DISCPLAYER_VERSION=${DISCPLAYER_VERSION}" >> "$GITHUB_ENV"
          echo "go-odio-api: ${ODIO_VERSION:-not found}"
          echo "go-mpd-discplayer: ${DISCPLAYER_VERSION:-not found}"

      - name: Download .deb packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p debs

          download_debs() {
            local repo="$1" version="$2"
            if [ -z "${version}" ]; then
              echo "⚠ Skipping ${repo}: no version found"
              return
            fi
            echo "⬇ Downloading ${repo} ${version}..."
            gh release download "${version}" \
              --repo "b0bbywan/${repo}" \
              --pattern "*.deb" \
              --dir debs/ \
              --clobber
          }

          download_debs "go-odio-api" "${ODIO_VERSION}"
          download_debs "go-mpd-discplayer" "${DISCPLAYER_VERSION}"

          echo "Downloaded packages:"
          ls -lh debs/ || echo "No packages found"

      - name: Build repository
        run: |
          mkdir -p repo
          cp -r conf repo/

          for deb in debs/*.deb; do
            [ -f "${deb}" ] || continue
            echo "Adding $(basename ${deb})..."
            reprepro -b repo includedeb stable "${deb}"
          done

          # Export public GPG key
          gpg --armor --export "${GPG_KEY_ID}" > repo/key.gpg

          # Generate install instructions
          # CNAME for custom domain
          echo "apt.odio.love" > repo/CNAME

          cat > repo/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html><head><title>Odio APT Repository</title></head>
          <body>
          <h1>Odio APT Repository</h1>
          <h2>Quick Install</h2>
          <pre><code>curl -fsSL https://apt.odio.love/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/odio.gpg
          echo "deb [signed-by=/usr/share/keyrings/odio.gpg] https://apt.odio.love stable main" | sudo tee /etc/apt/sources.list.d/odio.list
          sudo apt update
          sudo apt install go-odio-api go-mpd-discplayer</code></pre>
          </body></html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
